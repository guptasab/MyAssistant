<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0b1020" />
  <title>MyAssistant</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; }
    html, body { margin: 0; height: 100%; background: #0b1020; color: #e7ecff;
                 font-family: -apple-system, system-ui, sans-serif; touch-action: manipulation; }
    body { display: flex; flex-direction: column; padding: env(safe-area-inset-top) 16px env(safe-area-inset-bottom); }
    header { padding: 12px 0; font-weight: 700; font-size: 22px; display: flex; justify-content: space-between; align-items: center; }
    .status { font-size: 13px; color: #8aa0d8; }
    #log { flex: 1; overflow-y: auto; padding: 8px 0; }
    .row { margin: 12px 0; font-size: 20px; line-height: 1.35; }
    .you { color: #79e2ff; }
    .myassistant { color: #ffd479; }
    .ptt { width: 100%; height: 28vh; min-height: 180px; margin: 12px 0;
           background: #6759ff; color: white; font-size: 28px; font-weight: 700;
           border: none; border-radius: 28px; box-shadow: 0 8px 28px rgba(103,89,255,.45);
           transition: transform .07s ease, background .15s; }
    .ptt.active { background: #ff5e7e; transform: scale(.98); }
    .ptt:disabled { background: #333; }
    textarea { width: 100%; min-height: 60px; background: #14193a; color: #e7ecff;
               border: 1px solid #2a3270; border-radius: 14px; padding: 12px; font-size: 18px; resize: none; }
    .send { width: 100%; padding: 16px; margin-top: 8px; background: #1f2a66; color: white;
            font-size: 18px; border: none; border-radius: 14px; }
    .toolbar { display: flex; gap: 8px; margin-top: 8px; }
    .toolbar button { flex: 1; padding: 12px; background: transparent; color: #8aa0d8;
                      border: 1px solid #2a3270; border-radius: 10px; font-size: 14px; }
    .setup { background: #14193a; padding: 12px; border-radius: 12px; margin: 8px 0; }
    .setup input { width: 100%; padding: 10px; background: #0b1020; color: white;
                   border: 1px solid #2a3270; border-radius: 8px; margin-top: 4px; }
  </style>
</head>
<body>
  <header>
    <div>MyAssistant</div>
    <div class="status" id="status">idle</div>
  </header>

  <div id="setup" class="setup" style="display:none">
    <div>Server URL (e.g. https://home.tail-xxxx.ts.net:8765):</div>
    <input id="server" placeholder="http://192.168.1.10:8765" />
    <div style="margin-top:8px">Token (MYASSISTANT_HTTP_TOKEN):</div>
    <input id="token" type="password" />
    <button class="send" onclick="saveSetup()">Save</button>
  </div>

  <div id="log"></div>

  <textarea id="text" placeholder="Type or hold the button to talk…"></textarea>
  <button class="send" onclick="sendText()">Send</button>

  <button class="ptt" id="ptt">🎤  Hold to talk</button>

  <div class="toolbar">
    <button onclick="toggleSetup()">⚙ Settings</button>
    <button onclick="document.getElementById('log').innerHTML=''">Clear</button>
    <button onclick="speakLast()">🔊 Repeat</button>
  </div>

<script>
const log = document.getElementById('log');
const status = document.getElementById('status');
const ptt = document.getElementById('ptt');
let lastReply = '';
let mediaRecorder = null;
let chunks = [];

function cfg() {
  return { url: localStorage.getItem('myassistant_url') || '', token: localStorage.getItem('myassistant_token') || '' };
}
function toggleSetup() {
  const s = document.getElementById('setup');
  s.style.display = s.style.display === 'none' ? 'block' : 'none';
  document.getElementById('server').value = cfg().url;
  document.getElementById('token').value = cfg().token;
}
function saveSetup() {
  localStorage.setItem('myassistant_url', document.getElementById('server').value.trim());
  localStorage.setItem('myassistant_token', document.getElementById('token').value.trim());
  toggleSetup();
}
if (!cfg().url) toggleSetup();

function appendRow(who, text) {
  const div = document.createElement('div');
  div.className = 'row ' + who;
  div.textContent = (who === 'you' ? '🗣 ' : '🤖 ') + text;
  log.appendChild(div);
  log.scrollTop = log.scrollHeight;
}

async function sendText() {
  const ta = document.getElementById('text');
  const text = ta.value.trim();
  if (!text) return;
  ta.value = '';
  appendRow('you', text);
  status.textContent = 'thinking…';
  const { url, token } = cfg();
  try {
    const r = await fetch(url + '/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
      body: JSON.stringify({ text, user: 'mobile', speak: true }),
    });
    const j = await r.json();
    lastReply = j.reply;
    appendRow('myassistant', j.reply);
    if (j.audio_url) playAudio(url + j.audio_url);
    else speak(j.reply);
  } catch (e) { appendRow('myassistant', 'error: ' + e); }
  status.textContent = 'idle';
}

function playAudio(src) {
  const a = new Audio(src);
  a.play().catch(() => speak(lastReply));
}
function speak(text) {
  try { const u = new SpeechSynthesisUtterance(text); speechSynthesis.speak(u); } catch {}
}
function speakLast() { if (lastReply) speak(lastReply); }

// Push-to-talk
async function startPTT() {
  if (!navigator.mediaDevices) return alert('mic not available');
  const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
  mediaRecorder = new MediaRecorder(stream);
  chunks = [];
  mediaRecorder.ondataavailable = e => chunks.push(e.data);
  mediaRecorder.onstop = () => sendVoice(new Blob(chunks, { type: 'audio/webm' }), stream);
  mediaRecorder.start();
  ptt.classList.add('active');
  status.textContent = 'listening…';
}
function stopPTT() {
  if (mediaRecorder && mediaRecorder.state === 'recording') mediaRecorder.stop();
  ptt.classList.remove('active');
}
async function sendVoice(blob, stream) {
  stream.getTracks().forEach(t => t.stop());
  status.textContent = 'transcribing…';
  const { url, token } = cfg();
  const fd = new FormData();
  fd.append('file', blob, 'clip.webm');
  fd.append('user', 'mobile');
  try {
    const r = await fetch(url + '/voice', {
      method: 'POST',
      headers: { 'Authorization': 'Bearer ' + token },
      body: fd,
    });
    const j = await r.json();
    if (j.transcript) appendRow('you', j.transcript);
    if (j.reply) { lastReply = j.reply; appendRow('myassistant', j.reply); }
    if (j.audio_url) playAudio(url + j.audio_url);
    else if (j.reply) speak(j.reply);
  } catch (e) { appendRow('myassistant', 'error: ' + e); }
  status.textContent = 'idle';
}
ptt.addEventListener('mousedown', startPTT);
ptt.addEventListener('mouseup', stopPTT);
ptt.addEventListener('mouseleave', stopPTT);
ptt.addEventListener('touchstart', e => { e.preventDefault(); startPTT(); });
ptt.addEventListener('touchend',   e => { e.preventDefault(); stopPTT(); });

if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(()=>{});
</script>
</body>
</html>
